  <style>
body { background: #05070f; color: #c8d6e5; margin: 0; padding: 0;
       font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.site-shell { display: flex; min-height: 100vh; }
.site-sidebar { width: 260px; background: linear-gradient(180deg, #0c111b 0%, #141a25 100%);
               border-right: 1px solid #1f2b42; padding: 24px 0; display: flex; flex-direction: column; }
.sidebar-brand { font-weight: 700; font-size: 1.1rem; color: #e0efff; text-align: center;
                 margin-bottom: 24px; letter-spacing: 2px; }
.sidebar-links { display: flex; flex-direction: column; gap: 4px; padding: 0 16px; }
.sidebar-links a { color: #b3c7dd; text-decoration: none; padding: 10px 14px;
                  border-radius: 6px; font-size: 0.95rem; display: block; transition: all 0.15s; }
.sidebar-links a:hover { background: rgba(74, 158, 255, 0.14); color: #fff; }
.sidebar-links a.active { background: rgba(74, 158, 255, 0.22); color: #fff; border-left: 4px solid #4a9eff; padding-left: 10px; }
.page-content { flex: 1; max-width: 1200px; margin: 0 auto; padding: 36px 32px; }
/* Markdown styling */
.md-content h1 { color: #4a9eff; border-bottom: 1px solid #2d4a6f; padding-bottom: 8px; }
.md-content h2 { color: #4a9eff; margin-top: 28px; border-bottom: 1px solid #1a2d4a; padding-bottom: 6px; }
.md-content h3 { color: #00cec9; margin-top: 22px; }
.md-content h4 { color: #8a9bb0; }
.md-content a { color: #4a9eff; }
.md-content code { color: #00cec9; background: #1a2d4a; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
.md-content pre { background: #0f1a2e; border: 1px solid #2d4a6f; border-radius: 6px;
                  padding: 14px; overflow-x: auto; }
.md-content pre code { background: none; padding: 0; }
.md-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.md-content th { background: #1a2d4a; color: #c8d6e5; border: 1px solid #2d4a6f; padding: 8px 12px; text-align: left; }
.md-content td { border: 1px solid #1a2d4a; padding: 8px 12px; }
.md-content blockquote { border-left: 3px solid #4a9eff; padding-left: 14px; color: #8a9bb0; margin: 12px 0; }
.md-content ul, .md-content ol { padding-left: 22px; }
.md-content li { margin-bottom: 4px; }
.md-content hr { border: none; border-top: 1px solid #2d4a6f; margin: 20px 0; }
</style>
  
</head>

    <style>
